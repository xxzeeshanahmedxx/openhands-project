<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shooter Game</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://threejs.org/build/three.js"></script>
    <script>
        let scene, camera, renderer, spaceship, enemies = [], bullets = [];
        let score = 0, health = 100, shields = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Spaceship
            const geometry = new THREE.BoxGeometry(1, 1, 2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            spaceship = new THREE.Mesh(geometry, material);
            scene.add(spaceship);
            camera.position.z = 5;

            // Enemies setup (for simplicity, only one)
            const enemyGeometry = new THREE.BoxGeometry(1, 1, 2);
            const enemyMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
            enemy.position.x = Math.random() * 10 - 5;
            enemy.position.z = Math.random() * 10 - 5;
            scene.add(enemy);
            enemies.push(enemy);

            // Event listeners
            document.addEventListener('keydown', shoot);

            animate();
        }

        function shoot(event) {
            if (event.code === 'Space') {
                const bulletGeometry = new THREE.SphereGeometry(0.1, 32, 32);
                const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
                bullet.position.copy(spaceship.position);
                bullet.velocity = 0.1;
                bullets.push(bullet);
                scene.add(bullet);
            }
        }

        function checkCollisions() {
            bullets.forEach((bullet, bulletIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    const distance = bullet.position.distanceTo(enemy.position);
                    if (distance < 1) { // Simple collision detection
                        scene.remove(bullet);
                        scene.remove(enemy);
                        bullets.splice(bulletIndex, 1);
                        enemies.splice(enemyIndex, 1);
                        score += 10;
                        console.log('Score:', score);
                    }
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            bullets.forEach(bullet => {
                bullet.position.z -= bullet.velocity;
            });
            checkCollisions();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
